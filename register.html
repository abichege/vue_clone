<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS – Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

:root {
    --ink: #14141f;
    --ink-2: #1c1c2a;
    --paper: #f4f2ec;
    --till-green: #1f7a4d;
    --line: rgba(244,242,236,0.12);
    --accent: #6b35c9;
    --muted: rgba(244,242,236,0.6);
}

body {
    background: var(--ink) !important;
    color: var(--paper);
    font-family: 'Inter', sans-serif;
}

h1, h2, h3, h4, h5, h6, .navbar-brand, .modal-title {
    font-family: 'Space Grotesk', sans-serif !important;
}

.text-muted, .form-text { color: var(--muted) !important; }

/* Navbar */
.navbar, .navbar.bg-body-tertiary {
    background: var(--ink-2) !important;
    border-bottom: 1px solid var(--line);
}
.navbar-brand, .nav-link, .text-white, .text-white-50 {
    color: var(--paper) !important;
}
.navbar-brand span.accent { color: var(--accent); }
.nav-link.active { color: var(--accent) !important; font-weight: 600; }
.nav-link:hover { color: var(--accent) !important; }

/* Cards */
.card {
    background: rgba(244,242,236,0.04) !important;
    border: 1px solid var(--line) !important;
    color: var(--paper);
    border-radius: 10px;
}
.card-header {
    background: rgba(244,242,236,0.05) !important;
    border-bottom: 1px solid var(--line) !important;
    color: var(--paper);
    font-family: 'Space Grotesk', sans-serif;
}

/* Forms */
.form-control, .form-select {
    background: rgba(244,242,236,0.05) !important;
    border: 1px solid var(--line) !important;
    color: var(--paper) !important;
}
.form-control::placeholder { color: rgba(244,242,236,0.35); }
.form-control:focus, .form-select:focus {
    background: rgba(244,242,236,0.07) !important;
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 0.2rem rgba(107,53,201,0.30) !important;
    color: var(--paper) !important;
}
.form-control:disabled { opacity: 0.5; }
.form-label { color: var(--paper); font-weight: 500; font-size: 0.9rem; }
.input-group-text {
    background: rgba(244,242,236,0.08) !important;
    border: 1px solid var(--line) !important;
    color: var(--paper) !important;
}

/* Buttons */
.btn { border-radius: 7px; font-weight: 500; }
.btn-primary { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }
.btn-primary:hover, .btn-primary:focus { background: #7e4ad6 !important; border-color: #7e4ad6 !important; }
.btn-success { background: var(--till-green) !important; border-color: var(--till-green) !important; }
.btn-success:hover { background: #25925d !important; border-color: #25925d !important; }
.btn-warning { background: #d99a1c !important; border-color: #d99a1c !important; color: #14141f !important; }
.btn-danger { background: #c8453a !important; border-color: #c8453a !important; }
.btn-secondary { background: rgba(244,242,236,0.1) !important; border-color: var(--line) !important; color: var(--paper) !important; }
.btn-secondary:hover { background: rgba(244,242,236,0.18) !important; }
.btn-dark { background: #0c0c14 !important; border-color: var(--line) !important; }
/* Logout button uses the accent color instead of a generic light outline */
.btn-outline-light { border-color: var(--accent) !important; color: var(--accent) !important; background: transparent !important; }
.btn-outline-light:hover { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }

/* Alerts */
.alert-danger { background: rgba(200,69,58,0.15) !important; color: #ff9a8d !important; border: 1px solid rgba(200,69,58,0.35) !important; }
.alert-success { background: rgba(31,122,77,0.15) !important; color: #6fdba3 !important; border: 1px solid rgba(31,122,77,0.35) !important; }
.alert-info { background: rgba(13,110,253,0.12) !important; color: #8fc1ff !important; border: 1px solid rgba(13,110,253,0.3) !important; }

/* Badges */
.badge.bg-success { background: var(--till-green) !important; }
.badge.bg-danger { background: #c8453a !important; }
.badge.bg-warning { background: #d99a1c !important; }
.badge.bg-secondary { background: rgba(244,242,236,0.15) !important; }
.badge-stock-ok { background: var(--till-green) !important; }
.badge-stock-low { background: #d99a1c !important; }
.badge-stock-none { background: #c8453a !important; }

/* Tables */
.table { color: var(--paper); border-color: var(--line); }
.table > :not(caption) > * > * { background: transparent; color: var(--paper); border-color: var(--line); }
.table-striped > tbody > tr:nth-of-type(odd) > * { background: rgba(244,242,236,0.03); color: var(--paper); }
.table-hover > tbody > tr:hover > * { background: rgba(107,53,201,0.10); color: var(--paper); }
.table thead { border-bottom: 1px solid var(--line); font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
.table-sm { color: var(--paper); }

/* DataTables controls */
.dataTables_wrapper { color: var(--paper); }
.dataTables_filter input, .dataTables_length select {
    background: rgba(244,242,236,0.05); border: 1px solid var(--line); color: var(--paper); border-radius: 6px;
}
.dataTables_info, .dataTables_length label, .dataTables_filter label { color: var(--muted) !important; }
.page-link { background: transparent !important; border-color: var(--line) !important; color: var(--paper) !important; }
.page-item.active .page-link { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }
.page-item.disabled .page-link { color: rgba(244,242,236,0.3) !important; }

/* Modals */
.modal-content { background: var(--ink-2) !important; color: var(--paper); border: 1px solid var(--line) !important; border-radius: 10px; }
.modal-header, .modal-footer { border-color: var(--line) !important; }
.btn-close { filter: invert(1) grayscale(1) brightness(1.8); }

/* Login/register centered card polish */
.vh-100.d-flex .card { box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6) !important; }

/* Stat cards (dashboard) */
.stat-card { background: rgba(244,242,236,0.04) !important; }
.stat-card.sales   { border-left-color: var(--accent) !important; }
.stat-card.revenue { border-left-color: var(--till-green) !important; }
.stat-card.stock   { border-left-color: #d99a1c !important; }
.stat-card.pending { border-left-color: #d99a1c !important; }
.stat-value { font-family: 'Space Grotesk', sans-serif; }
.text-primary { color: var(--accent) !important; }
.text-success { color: #6fdba3 !important; }
.text-warning { color: #f0b94c !important; }
.text-danger { color: #ff9a8d !important; }

.chart-card { background: rgba(244,242,236,0.04) !important; }

a { color: var(--accent); }

/* Action buttons (Sell/Edit/Delete etc.) — vertically centered as a group,
   wrap onto a new line if space is tight, and stack full-width on very
   small phones so they stay tappable. */
.action-buttons {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.35rem;
}
@media (max-width: 480px) {
    .action-buttons { flex-direction: column; align-items: stretch; }
    .action-buttons .btn { width: 100%; }
}

/* DataTables Responsive plugin — "+" expand control for small screens */
table.dtr-inline.collapsed > tbody > tr > td.dtr-control,
table.dtr-inline.collapsed > tbody > tr > th.dtr-control {
    position: relative;
    padding-left: 30px;
}
table.dtr-inline.collapsed > tbody > tr > td.dtr-control::before,
table.dtr-inline.collapsed > tbody > tr > th.dtr-control::before {
    background-color: var(--accent);
    box-shadow: 0 0 0 1px var(--paper);
}
table.dtr-inline.collapsed > tbody > tr.parent > td.dtr-control::before,
table.dtr-inline.collapsed > tbody > tr.parent > th.dtr-control::before {
    background-color: #c8453a;
}
ul.dtr-details { list-style: none; padding: 0; margin: 0; }
ul.dtr-details > li { border-bottom: 1px solid var(--line); padding: 0.4rem 0; }
ul.dtr-details > li:last-child { border-bottom: none; }
.dtr-title { font-weight: 600; color: var(--paper); margin-right: 0.4rem; }
div.dtr-modal div.dtr-modal-display {
    background: var(--ink-2) !important;
    color: var(--paper) !important;
    border: 1px solid var(--line) !important;
}
div.dtr-modal div.dtr-modal-close {
    background: var(--accent) !important;
    color: #fff !important;
    border: none !important;
}

/* Register page: submit button uses the purple accent instead of green */
.vh-100 .btn-success {
    background: var(--accent) !important;
    border-color: var(--accent) !important;
    color: #fff !important;
}
.vh-100 .btn-success:hover {
    background: #7e4ad6 !important;
    border-color: #7e4ad6 !important;
}

    </style>
</head>

<body>
    <div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">MY POS</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="register.html">Register</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="login.html">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div id="app" class="d-flex align-items-center justify-content-center vh-100">
            <div class="card shadow p-4" style="width:100%;max-width:440px;">
                <h4 class="text-center fw-bold mb-1">POS System</h4>
                <p class="text-center text-muted mb-4">Create your account</p>

                <div v-if="errorMsg" class="alert alert-danger  py-2">{{ errorMsg }}</div>
                <div v-if="successMsg" class="alert alert-success py-2">{{ successMsg }}</div>

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input v-model="full_name" type="text" class="form-control" placeholder="Your Name" />
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input v-model="email" type="email" class="form-control" placeholder="you@example.com" />
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input v-model="password" type="password" class="form-control" placeholder="••••••••" />
                    <div v-if="password" class="small mt-1" :class="passwordStrength === 'strong' ? 'text-success' : 'text-danger'">
                        <span v-if="passwordStrength === 'strong'">✅ Strong password</span>
                        <span v-else>⚠️ Weak password — needs at least 8 characters, an uppercase letter, a number, and a special character</span>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input v-model="confirmPassword" type="password" class="form-control" placeholder="••••••••"
                        @keyup.enter="register" />
                </div>

                <button class="btn btn-success w-100" @click="register" :disabled="loading">
                    <span v-if="loading" class="spinner-border spinner-border-sm me-1"></span>
                    {{ loading ? 'Registering…' : 'Register' }}
                </button>

                <p class="text-center mt-3 mb-0">
                    Already have an account? <a href="login.html">Login</a>
                </p>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const BASE_URL = "http://174.138.45.153:7000"

        new Vue({
            el: "#app",
            data: {
                full_name: "",
                email: "",
                password: "",
                confirmPassword: "",
                errorMsg: "",
                successMsg: "",
                loading: false
            },
            computed: {
                passwordStrength() {
                    const pwd = this.password || ""
                    const hasUpper = /[A-Z]/.test(pwd)
                    const hasNumber = /\d/.test(pwd)
                    const hasSpecial = /[!@#$%^&*(),.?":{}|<>_\-+=~`\[\]\\/;']/.test(pwd)
                    const longEnough = pwd.length >= 8
                    return (hasUpper && hasNumber && hasSpecial && longEnough) ? "strong" : "weak"
                }
            },
            methods: {
                async register() {
                    this.errorMsg = ""
                    this.successMsg = ""

                    if (this.full_name === "" || this.email === "" || this.password === "" || this.confirmPassword === "") {
                        this.errorMsg = "All fields are required"
                        return
                    }

                    if (this.password !== this.confirmPassword) {
                        this.errorMsg = "Passwords do not match"
                        return
                    }

                    if (this.passwordStrength === "weak") {
                        this.errorMsg = "Password is too weak. Use at least 8 characters with an uppercase letter, a number, and a special character."
                        return
                    }

                    this.loading = true
                    try {
                        const res = await axios.post(`${BASE_URL}/register`, {
                            full_name: this.full_name,
                            email: this.email,
                            password: this.password
                        })
                        localStorage.setItem("token", res.data.token)
                        this.successMsg = "Registered successfully! Redirecting…"
                        setTimeout(() => window.location.href = "products.html", 1000)
                    } catch (err) {
                        this.errorMsg = err.response?.data?.msg || "Registration failed"
                    } finally {
                        this.loading = false
                    }
                }
            }
        })
    </script>
</body>

</html>
