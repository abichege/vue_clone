<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS – Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

:root {
    --ink: #14141f;
    --ink-2: #1c1c2a;
    --paper: #f4f2ec;
    --till-green: #1f7a4d;
    --line: rgba(244,242,236,0.12);
    --accent: #6b35c9;
    --muted: rgba(244,242,236,0.6);
}

body {
    background: var(--ink) !important;
    color: var(--paper);
    font-family: 'Inter', sans-serif;
}

h1, h2, h3, h4, h5, h6, .navbar-brand, .modal-title {
    font-family: 'Space Grotesk', sans-serif !important;
}

.text-muted, .form-text { color: var(--muted) !important; }

/* Navbar */
.navbar, .navbar.bg-body-tertiary {
    background: var(--ink-2) !important;
    border-bottom: 1px solid var(--line);
}
.navbar-brand, .nav-link, .text-white, .text-white-50 {
    color: var(--paper) !important;
}
.navbar-brand span.accent { color: var(--accent); }
.nav-link.active { color: var(--accent) !important; font-weight: 600; }
.nav-link:hover { color: var(--accent) !important; }

/* Cards */
.card {
    background: rgba(244,242,236,0.04) !important;
    border: 1px solid var(--line) !important;
    color: var(--paper);
    border-radius: 10px;
}
.card-header {
    background: rgba(244,242,236,0.05) !important;
    border-bottom: 1px solid var(--line) !important;
    color: var(--paper);
    font-family: 'Space Grotesk', sans-serif;
}

/* Forms */
.form-control, .form-select {
    background: rgba(244,242,236,0.05) !important;
    border: 1px solid var(--line) !important;
    color: var(--paper) !important;
}
.form-control::placeholder { color: rgba(244,242,236,0.35); }
.form-control:focus, .form-select:focus {
    background: rgba(244,242,236,0.07) !important;
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 0.2rem rgba(107,53,201,0.30) !important;
    color: var(--paper) !important;
}
.form-control:disabled { opacity: 0.5; }
.form-label { color: var(--paper); font-weight: 500; font-size: 0.9rem; }
.input-group-text {
    background: rgba(244,242,236,0.08) !important;
    border: 1px solid var(--line) !important;
    color: var(--paper) !important;
}

/* Buttons */
.btn { border-radius: 7px; font-weight: 500; }
.btn-primary { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }
.btn-primary:hover, .btn-primary:focus { background: #7e4ad6 !important; border-color: #7e4ad6 !important; }
.btn-success { background: var(--till-green) !important; border-color: var(--till-green) !important; }
.btn-success:hover { background: #25925d !important; border-color: #25925d !important; }
.btn-warning { background: #d99a1c !important; border-color: #d99a1c !important; color: #14141f !important; }
.btn-danger { background: #c8453a !important; border-color: #c8453a !important; }
.btn-secondary { background: rgba(244,242,236,0.1) !important; border-color: var(--line) !important; color: var(--paper) !important; }
.btn-secondary:hover { background: rgba(244,242,236,0.18) !important; }
.btn-dark { background: #0c0c14 !important; border-color: var(--line) !important; }
.btn-outline-light { border-color: rgba(244,242,236,0.35) !important; color: var(--paper) !important; }
.btn-outline-light:hover { background: rgba(244,242,236,0.1) !important; color: var(--paper) !important; }

/* Alerts */
.alert-danger { background: rgba(200,69,58,0.15) !important; color: #ff9a8d !important; border: 1px solid rgba(200,69,58,0.35) !important; }
.alert-success { background: rgba(31,122,77,0.15) !important; color: #6fdba3 !important; border: 1px solid rgba(31,122,77,0.35) !important; }
.alert-info { background: rgba(13,110,253,0.12) !important; color: #8fc1ff !important; border: 1px solid rgba(13,110,253,0.3) !important; }

/* Badges */
.badge.bg-success { background: var(--till-green) !important; }
.badge.bg-danger { background: #c8453a !important; }
.badge.bg-warning { background: #d99a1c !important; }
.badge.bg-secondary { background: rgba(244,242,236,0.15) !important; }
.badge-stock-ok { background: var(--till-green) !important; }
.badge-stock-low { background: #d99a1c !important; }
.badge-stock-none { background: #c8453a !important; }

/* Tables */
.table { color: var(--paper); border-color: var(--line); }
.table > :not(caption) > * > * { background: transparent; color: var(--paper); border-color: var(--line); }
.table-striped > tbody > tr:nth-of-type(odd) > * { background: rgba(244,242,236,0.03); color: var(--paper); }
.table-hover > tbody > tr:hover > * { background: rgba(107,53,201,0.10); color: var(--paper); }
.table thead { border-bottom: 1px solid var(--line); font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
.table-sm { color: var(--paper); }

/* DataTables controls */
.dataTables_wrapper { color: var(--paper); }
.dataTables_filter input, .dataTables_length select {
    background: rgba(244,242,236,0.05); border: 1px solid var(--line); color: var(--paper); border-radius: 6px;
}
.dataTables_info, .dataTables_length label, .dataTables_filter label { color: var(--muted) !important; }
.page-link { background: transparent !important; border-color: var(--line) !important; color: var(--paper) !important; }
.page-item.active .page-link { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }
.page-item.disabled .page-link { color: rgba(244,242,236,0.3) !important; }

/* Modals */
.modal-content { background: var(--ink-2) !important; color: var(--paper); border: 1px solid var(--line) !important; border-radius: 10px; }
.modal-header, .modal-footer { border-color: var(--line) !important; }
.btn-close { filter: invert(1) grayscale(1) brightness(1.8); }

/* Login/register centered card polish */
.vh-100.d-flex .card { box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6) !important; }

/* Stat cards (dashboard) */
.stat-card { background: rgba(244,242,236,0.04) !important; }
.stat-card.sales   { border-left-color: var(--accent) !important; }
.stat-card.revenue { border-left-color: var(--till-green) !important; }
.stat-card.stock   { border-left-color: #d99a1c !important; }
.stat-card.pending { border-left-color: #d99a1c !important; }
.stat-value { font-family: 'Space Grotesk', sans-serif; }
.text-primary { color: var(--accent) !important; }
.text-success { color: #6fdba3 !important; }
.text-warning { color: #f0b94c !important; }
.text-danger { color: #ff9a8d !important; }

.chart-card { background: rgba(244,242,236,0.04) !important; }

a { color: var(--accent); }

    </style>
</head>

<body>
    <div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">MY POS</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link " href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " aria-current="page" href="register.html">Register</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="login.html">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div id="app" class="d-flex align-items-center justify-content-center vh-100">
            <div class="card shadow p-4" style="width:100%;max-width:420px;">
                <h4 class="text-center fw-bold mb-1">POS System</h4>
                <p class="text-center text-muted mb-4">Sign in to your account</p>

                <div v-if="errorMsg" class="alert alert-danger py-2">{{ errorMsg }}</div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input v-model="email" type="email" class="form-control" placeholder="you@example.com" />
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input v-model="password" type="password" class="form-control" placeholder="••••••••"
                        @keyup.enter="login" />
                </div>

                <button class="btn btn-primary w-100" @click="login" :disabled="loading">
                    <span v-if="loading" class="spinner-border spinner-border-sm me-1"></span>
                    {{ loading ? 'Signing in…' : 'Login' }}
                </button>

                <p class="text-center mt-3 mb-0">
                    Don't have an account? <a href="register.html">Register</a>
                </p>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const BASE_URL = "http://174.138.45.153:7000"

        new Vue({
            el: "#app",
            data: {
                email: "",
                password: "",
                errorMsg: "",
                loading: false
            },
            methods: {
                async login() {
                    this.errorMsg = ""

                    if (this.email === "" || this.password === "") {
                        this.errorMsg = "Email and password are required"
                        return
                    }

                    this.loading = true
                    try {
                        const res = await axios.post(`${BASE_URL}/login`, {
                            email: this.email,
                            password: this.password
                        })
                        localStorage.setItem("token", res.data.token)
                        localStorage.setItem("user", JSON.stringify(res.data.user))
                        window.location.href = "products.html"
                    } catch (err) {
                        this.errorMsg = err.response?.data?.msg || "Login failed"
                    } finally {
                        this.loading = false
                    }
                }
            }
        })
    </script>
</body>

</html>
